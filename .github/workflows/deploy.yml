name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Set build environment
        run: |
          API_DOMAIN="${{ secrets.API_DOMAIN }}"
          if [ -z "$API_DOMAIN" ]; then
            API_DOMAIN="chu-tui-qin-guan-li-gei-yu-tui-ce--dazhixiaolin274.replit.app"
          fi
          echo "EXPO_PUBLIC_DOMAIN=$API_DOMAIN" >> $GITHUB_ENV
          REPL_ID="${{ secrets.REPL_ID }}"
          if [ -z "$REPL_ID" ]; then
            REPL_ID="e9869198-145f-4f07-a6ca-98cef72cc705"
          fi
          echo "EXPO_PUBLIC_REPL_ID=$REPL_ID" >> $GITHUB_ENV

      - name: Export web build
        run: npx expo export -p web

      - name: Fix asset paths for GitHub Pages subpath
        run: |
          BASE="/Work-Time-Calc"
          find dist -name "*.html" | while read f; do
            sed -i \
              -e "s|href=\"/_expo/|href=\"${BASE}/_expo/|g" \
              -e "s|src=\"/_expo/|src=\"${BASE}/_expo/|g" \
              -e "s|href=\"/favicon.ico\"|href=\"${BASE}/favicon.ico\"|g" \
              -e "s|href=\"/manifest.json\"|href=\"${BASE}/manifest.json\"|g" \
              "$f"
          done
          cp dist/index.html dist/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
