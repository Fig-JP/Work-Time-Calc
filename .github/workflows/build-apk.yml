name: Build APK (EAS)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Expo + EAS
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm install

      - name: Build APK with EAS
        run: eas build --profile preview --platform android --non-interactive --output ./app-preview.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-preview
          path: ./app-preview.apk
          retention-days: 7
